<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela Cidadão - São Fidélis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: linear-gradient(135deg, #00529B 0%, #00264d 100%); min-height: 100vh; padding: 20px; color: white; }
        .container { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .header { text-align: center; margin-bottom: 25px; }
        .logo { font-size: 50px; margin-bottom: 10px; }
        h1 { font-size: 1.8em; margin-bottom: 5px; }
        .frase-cidade { font-size: 1.1em; color: #FFD700; font-weight: bold; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        
        /* ESTILO DO CHAT DA IA */
        .chat-ia { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; margin-bottom: 20px; border-left: 5px solid #4CAF50; }
        .mensagem-ia { display: flex; align-items: flex-start; gap: 10px; }
        .robo { font-size: 30px; }
        .texto-ia { background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 15px; line-height: 1.5; }

        .abas { display: flex; margin-bottom: 25px; border-radius: 12px; overflow: hidden; background: rgba(0,0,0,0.2); }
        .aba { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .aba.ativa { background: #FFD700; color: #00264d; }
        .conteudo-aba { display: none; }
        .conteudo-aba.ativa { display: block; }

        .grupo-input { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; background: rgba(255,255,255,0.9); color: #333; }
        button { width: 100%; padding: 15px; background: #FFD700; color: #00264d; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #FFC107; transform: scale(1.02); }
        
        #resultado, #resultadoDenuncia { margin-top: 20px; padding: 20px; border-radius: 10px; text-align: center; font-weight: bold; display: none; }
        .seguro { background: #d4edda; color: #155724; }
        .perigo { background: #dc3545; color: white; }
        .alerta { background: #fff3cd; color: #856404; }
        .sucesso { background: #28a745; color: white; }
        .rodape { text-align: center; margin-top: 30px; font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🛡️</div>
            <h1>Sentinela Cidadão</h1>
            <p class="frase-cidade">💙 A CIDADE DE SÃO FIDÉLIS ESTÁ PROTEGIDA! 🤍</p>
        </div>

        <!-- 💬 CHAT DA INTELIGÊNCIA ARTIFICIAL -->
        <div class="chat-ia">
            <div class="mensagem-ia">
                <span class="robo">🤖</span>
                <div class="texto-ia">
                    <strong>Olá, cidadão fidélense!</strong><br>
                    Sistema verificado e aprovado.<br>
                    Verificações 100% garantidas.<br>
                    Vamos juntos proteger nossa cidade! 🚔💙
                </div>
            </div>
        </div>

        <div class="abas">
            <div class="aba ativa" onclick="mudarAba('verificar')">🔍 Verificar</div>
            <div class="aba" onclick="mudarAba('denunciar')">📢 Denunciar</div>
        </div>

        <div id="verificar" class="conteudo-aba ativa">
            <div class="grupo-input">
                <label>Digite o site ou Chave Pix:</label>
                <input type="text" id="entradaUsuario" placeholder="Ex: https://site.com.br ou 123.456.789-09">
            </div>
            <button onclick="verificarSeguranca()">VERIFICAR AGORA</button>
            <div id="resultado"></div>
        </div>

        <div id="denunciar" class="conteudo-aba">
            <div class="grupo-input">
                <label>Tipo de problema:</label>
                <select id="tipoDenuncia">
                    <option value="site">Site Falso / Tentativa de Golpe</option>
                    <option value="pix">Pix Irregular / Extorsão</option>
                </select>
            </div>
            <div class="grupo-input">
                <label>Digite o endereço ou a chave:</label>
                <input type="text" id="valorDenuncia" placeholder="Cole aqui o link do site ou a chave Pix">
            </div>
            <div class="grupo-input">
                <label>🤖 Conte para a IA o que aconteceu:</label>
                <textarea id="descricao" rows="3" placeholder="Ex: Recebi um Pix falso dizendo ser da prefeitura..."></textarea>
            </div>
            <button onclick="cadastrarDenuncia()">ENVIAR DENÚNCIA SEGURA</button>
            <div id="resultadoDenuncia"></div>
        </div>

        <div class="rodape">Protegendo os cidadãos de São Fidélis | Moderação Aprovada | Dados Seguros 💙</div>
    </div>

    <!-- CÓDIGO DO FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 🔧 CONFIGURAÇÃO DO SEU PROJETO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDTzKuw6PFNswkCO8jZYfEf9f_-3zuDKSM",
            authDomain: "sentinela-cidad.firebaseapp.com",
            projectId: "sentinela-cidad",
            storageBucket: "sentinela-cidad.appspot.com",
            messagingSenderId: "645213005112",
            appId: "1:645213005112:web:dae57f5ebd6c9cfa39cdcd"
        };

        // INICIALIZAR O SISTEMA
        firebase.initializeApp(firebaseConfig);
        const bancoDeDados = firebase.database();

        // 🚫 LISTA NEGRA OFICIAL - VOCÊ ADMINISTRA AQUI
        // COLOQUE AQUI OS SITES E PIX QUE VOCÊ TEM CERTEZA QUE É GOLPE
        const listaOficial = [
            "pixdomilhao",
            "ganhedinheiro",
            "123.456.789-09"
            "voce.ganhou.1000.reais"
            // ADICIONE MAIS ABAIXO SE PRECISAR, SEPARADO POR VÍRGULA
        ];

        // 📋 FUNÇÃO PARA TROCAR DE ABA
        function mudarAba(nome) {
            document.getElementById('verificar').style.display = 'none';
            document.getElementById('denunciar').style.display = 'none';
            document.querySelectorAll('.aba')[0].classList.remove('ativa');
            document.querySelectorAll('.aba')[1].classList.remove('ativa');
            document.getElementById(nome).style.display = 'block';
            if(nome == 'verificar') document.querySelectorAll('.aba')[0].classList.add('ativa');
            else document.querySelectorAll('.aba')[1].classList.add('ativa');
        }

        // ✅ FUNÇÃO DE LIMPEZA TOTAL - REMOVE TUDO O QUE NÃO É LETRA
        function limparTexto(texto) {
            if (!texto) return "";
            return texto.toString().toLowerCase()
                .replace(/https?:\/\//g, '')
                .replace(/www\./g, '')
                .replace(/\./g, '')
                .replace(/\//g, '')
                .replace(/ /g, '')
                .trim();
        }

        // ✅ FUNÇÃO DE VERIFICAÇÃO - MODO SIMPLES E FORTE
        async function verificarSeguranca() {
            const entrada = document.getElementById('entradaUsuario').value.trim();
            const resultado = document.getElementById('resultado');
            
            if(!entrada) {
                resultado.innerHTML = "⚠️ Digite algo para verificar!";
                resultado.className = "alerta";
                resultado.style.display = "block";
                return;
            }

            resultado.style.display = "block";
            resultado.innerHTML = "🔍 ANALISANDO...";
            resultado.className = "alerta";

            const entradaLimpa = limparTexto(entrada);
            let encontrado = false;
            let motivo = "";

            // 1. PRIMEIRO VERIFICA NA LISTA QUE VOCÊ COLOCOU (GARANTIDO)
            for (let i = 0; i < listaOficial.length; i++) {
                const itemLimpo = limparTexto(listaOficial[i]);
                if (entradaLimpa.includes(itemLimpo)) {
                    encontrado = true;
                    motivo = "Golpe Confirmado pela Administração";
                    break; // Achou, já pode parar
                }
            }

            // 2. SE NÃO ACHOU, VAI VERIFICAR NO BANCO DE DADOS
            if (!encontrado) {
                try {
                    const snapshot = await bancoDeDados.ref('denuncias').once('value');
                    const dados = snapshot.val();

                    if (dados) {
                        // Pega cada item salvo no banco
                        for (let key in dados) {
                            let item = dados[key];
                            let itemSalvoLimpo = limparTexto(item.valor);
                            
                            // Compara
                            if (itemSalvoLimpo.includes(entradaLimpa)) {
                                encontrado = true;
                                motivo = "Denunciado por usuários";
                                break; // Achou, já pode parar
                            }
                        }
                    }
                } catch (erro) {
                    console.log("Sem conexão com nuvem, usando base local.");
                }
            }

            // 3. MOSTRA O RESULTADO FINAL
            if(encontrado) {
                resultado.innerHTML = `⛔ ALERTA GRAVE! ⛔<br><br>IDENTIFICADO COMO:<br><strong style="font-size:20px;">${motivo}</strong><br><br>NÃO CONFIE!`;
                resultado.className = "perigo";
            } else {
                resultado.innerHTML = `✅ VERIFICAÇÃO CONCLUÍDA<br><br>Não encontramos esse dado na nossa lista de bloqueio.<br><strong>Mas SEMPRE confira o NOME antes de pagar!</strong>`;
                resultado.className = "seguro";
            }
        }

        // 🤖 FUNÇÃO DE DENÚNCIA
        function cadastrarDenuncia() {
            const tipo = document.getElementById('tipoDenuncia').value;
            const valor = document.getElementById('valorDenuncia').value.trim();
            const descricao = document.getElementById('descricao').value;
            const resultado = document.getElementById('resultadoDenuncia');

            if(valor == "") {
                resultado.innerHTML = "⚠️ Preencha o site ou a chave!";
                resultado.className = "alerta";
                resultado.style.display = "block";
                return;
            }

            // SALVA COMO "SUGESTÃO" NA NUVEM
            bancoDeDados.ref('denuncias').push({
                tipo: tipo,
                valor: valor,
                descricao: descricao,
                status: "PENDENTE"
            });

            resultado.innerHTML = `📥 DENÚNCIA RECEBIDA!<br><br>Essa informação foi salva e será analisada.<br>Obrigado por ajudar a cidade! 💙`;
            resultado.className = "sucesso";
            resultado.style.display = "block";

            // Limpar campos
            document.getElementById('valorDenuncia').value = "";
            document.getElementById('descricao').value = "";
        }
    </script>
</body>
</html>
