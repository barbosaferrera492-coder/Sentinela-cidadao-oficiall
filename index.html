<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela Cidadão - São Fidélis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #00529B 0%, #00264d 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo { font-size: 50px; margin-bottom: 10px; }
        h1 { font-size: 1.8em; margin-bottom: 5px; }
        .frase-cidade {
            font-size: 1.1em;
            color: #FFD700;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        /* ABAS */
        .abas {
            display: flex;
            margin-bottom: 25px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
        }

        .aba {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .aba.ativa {
            background: #FFD700;
            color: #00264d;
        }

        .conteudo-aba {
            display: none;
        }

        .conteudo-aba.ativa {
            display: block;
        }

        /* FORMULÁRIOS */
        .grupo-input {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background: rgba(255,255,255,0.9);
            color: #333;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #FFD700;
            color: #00264d;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #FFC107;
            transform: scale(1.02);
        }

        #resultado, #resultadoDenuncia {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .seguro { background: #d4edda; color: #155724; }
        .perigo { background: #dc3545; color: white; }
        .alerta { background: #fff3cd; color: #856404; }
        .sucesso { background: #28a745; color: white; }

        .rodape {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🛡️</div>
            <h1>Sentinela Cidadão</h1>
            <p class="frase-cidade">💙 A CIDADE DE SÃO FIDÉLIS ESTÁ PROTEGIDA! 🤍</p>
        </div>

        <!-- MENU DE ABAS -->
        <div class="abas">
            <div class="aba ativa" onclick="mudarAba('verificar')">🔍 Verificar</div>
            <div class="aba" onclick="mudarAba('denunciar')">📢 Denunciar</div>
        </div>

        <!-- ABA 1: VERIFICAR -->
        <div id="verificar" class="conteudo-aba ativa">
            <div class="grupo-input">
                <label>Digite o site ou Chave Pix:</label>
                <input type="text" id="entradaUsuario" placeholder="Ex: https://site.com ou 123.456.789-09">
            </div>

            <button onclick="verificarSeguranca()">VERIFICAR AGORA</button>

            <div id="resultado"></div>
        </div>

        <!-- ABA 2: DENUNCIAR -->
        <div id="denunciar" class="conteudo-aba">
            <div class="grupo-input">
                <label>Tipo de problema:</label>
                <select id="tipoDenuncia">
                    <option value="site">Site Falso / Golpe</option>
                    <option value="pix">Pix Indevido / Extorsão</option>
                </select>
            </div>

            <div class="grupo-input">
                <label>Digite o endereço ou chave:</label>
                <input type="text" id="valorDenuncia" placeholder="Cole aqui o site ou a chave Pix">
            </div>

            <div class="grupo-input">
                <label>Conte o que aconteceu:</label>
                <textarea id="descricao" rows="3" placeholder="Ex: Recebi um Pix falso dizendo ser da prefeitura..."></textarea>
            </div>

            <button onclick="cadastrarDenuncia()">ENVIAR DENÚNCIA SEGURA</button>

            <div id="resultadoDenuncia"></div>
        </div>

        <div class="rodape">
            Protegendo os cidadãos de São Fidélis | Todos unidos contra o crime 💙
        </div>
    </div>

    <script>
        // LISTA NEGRA DA CIDADE
        let listaPixGolpe = [
            "123.456.789-09",
            "987.654.321-00"
        ];

        let listaSitesGolpe = [
            "sitefalso.com",
            "fraude.net"
        ];

        // FUNÇÃO DAS ABAS - AGORA FUNCIONA CERTO!
        function mudarAba(nome) {
            // Esconde tudo
            document.getElementById('verificar').style.display = 'none';
            document.getElementById('denunciar').style.display = 'none';
            
            // Remove classe ativa
            document.querySelectorAll('.aba')[0].classList.remove('ativa');
            document.querySelectorAll('.aba')[1].classList.remove('ativa');
            
            // Mostra a aba escolhida
            document.getElementById(nome).style.display = 'block';
            
            // Marca como ativa
            if(nome == 'verificar') {
                document.querySelectorAll('.aba')[0].classList.add('ativa');
            } else {
                document.querySelectorAll('.aba')[1].classList.add('ativa');
            }
        }

        // FUNÇÃO DE VERIFICAÇÃO
        function verificarSeguranca() {
            const entrada = document.getElementById('entradaUsuario').value.trim().toLowerCase();
            const resultado = document.getElementById('resultado');

            resultado.style.display = "block";

            // Verifica se está na lista negra
            const ehPixGolpe = listaPixGolpe.some(item => entrada.includes(item.toLowerCase()));
            const ehSiteGolpe = listaSitesGolpe.some(item => entrada.includes(item.toLowerCase()));

            if(ehPixGolpe || ehSiteGolpe) {
                resultado.innerHTML = "⚠️ ATENÇÃO! ⚠️<br><br>ESSE DADO JÁ FOI DENUNCIADO EM SÃO FIDÉLIS!<br>NÃO CONFIE!";
                resultado.className = "perigo";
            } else {
                resultado.innerHTML = "ℹ️ DICA:<br>Confira sempre o NOME da conta antes de pagar!<br>Se for diferente, cancele!";
                resultado.className = "alerta";
            }
        }

        // FUNÇÃO DE DENÚNCIA
        function cadastrarDenuncia() {
            const tipo = document.getElementById('tipoDenuncia').value;
            const valor = document.getElementById('valorDenuncia').value.trim();
            const descricao = document.getElementById('descricao').value;
            const resultado = document.getElementById('resultadoDenuncia');

            if(valor == "") {
                resultado.innerHTML = "⚠️ Preencha o site ou a chave!";
                resultado.className = "alerta";
                resultado.style.display = "block";
                return;
            }

            // Adiciona na lista
            if(tipo == "pix") {
                listaPixGolpe.push(valor);
            } else {
                listaSitesGolpe.push(valor);
            }

            // Resposta
            resultado.innerHTML = "✅ DENÚNCIA REGISTRADA! ✅<br><br>Obrigado por proteger nossa cidade! 💙";
            resultado.className = "sucesso";
            resultado.style.display = "block";

            // Limpa
            document.getElementById('valorDenuncia').value = "";
            document.getElementById('descricao').value = "";
        }
    </script>
</body>
</html>
