<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinela Cidadão - São Fidélis</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul:#00529B; --azul-escuro:#00264d; --azul-profundo:#001830;
      --dourado:#FFD700; --dourado-suave:#FFC107;
      --verde:#2ecc71; --vermelho:#e74c3c; --branco:#ffffff;
      --vidro:rgba(255,255,255,0.08); --vidro-borda:rgba(255,255,255,0.15);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Barlow',sans-serif;background:var(--azul-profundo);
      min-height:100vh;padding:20px 16px 40px;color:var(--branco);
      position:relative;overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(0,82,155,0.5) 0%,transparent 60%);
      z-index:0;pointer-events:none;
    }
    .container{position:relative;z-index:1;max-width:580px;margin:0 auto;}
    .header{text-align:center;padding:36px 20px 28px;}
    .logo-wrap{
      display:inline-flex;align-items:center;justify-content:center;
      width:110px;height:110px;border-radius:50%;margin-bottom:18px;
      box-shadow:0 8px 40px rgba(0,82,155,0.7);background:transparent;
    }
    h1{font-family:'Barlow Condensed',sans-serif;font-size:2.4em;font-weight:800;text-transform:uppercase;}
    .frase-cidade{color:var(--dourado);font-weight:700;text-transform:uppercase;font-size:0.9em;}
    .card{background:var(--vidro);border:1px solid var(--vidro-borda);border-radius:20px;padding:24px;backdrop-filter:blur(16px);margin-bottom:16px;}
    .chat-ia{display:flex;gap:12px;align-items:flex-start;}
    .texto-ia{background:rgba(0,82,155,0.3);padding:14px 16px;border-radius:4px 16px 16px 16px;font-size:0.95em;}
    .abas{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
    .aba{padding:13px;text-align:center;cursor:pointer;border-radius:12px;background:var(--vidro);color:rgba(255,255,255,0.5);font-weight:700;}
    .aba.ativa{background:var(--dourado);color:var(--azul-escuro);}
    .conteudo-aba{display:none;}
    .conteudo-aba.ativa{display:block;}
    input,select,textarea{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--vidro-borda);background:rgba(0,0,0,0.25);color:var(--branco);margin-bottom:16px;}
    .btn-principal{width:100%;padding:16px;background:var(--dourado);color:var(--azul-escuro);border:none;border-radius:12px;font-weight:800;cursor:pointer;}
    #resultado,#resultadoDenuncia{margin-top:16px;padding:18px;border-radius:12px;display:none;}
    .seguro{background:rgba(46,204,113,0.12);border:1px solid rgba(46,204,113,0.5);color:#2ecc71;}
    .perigo{background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.5);color:#ff6b6b;}
    .alerta{background:rgba(243,156,18,0.12);border:1px solid rgba(243,156,18,0.5);color:#f39c12;}
    .loading-ia{display:none;text-align:center;margin-top:16px;}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-wrap">🛡️</div>
    <h1>Sentinela Cidadão</h1>
    <p class="frase-cidade">💙 São Fidélis Protegida 🤍</p>
  </div>

  <div class="card">
    <div class="chat-ia">
      <div class="texto-ia">
        <strong>Olá, cidadão fidélense!</strong><br>
        Cole qualquer site ou Pix e eu analiso pra você! 🔍💙
      </div>
    </div>
  </div>

  <div class="abas">
    <div class="aba ativa" id="aba-verificar" onclick="mudarAba('verificar')">🔍 Verificar</div>
    <div class="aba" id="aba-denunciar" onclick="mudarAba('denunciar')">📢 Denunciar</div>
  </div>

  <div class="card">
    <div id="verificar" class="conteudo-aba ativa">
      <input type="text" id="entradaUsuario" placeholder="Ex: https://site.com.br ou 123.456.789-09">
      <button class="btn-principal" id="btnVerificar" onclick="verificarComIA()">🔍 VERIFICAR COM IA</button>
      <div class="loading-ia" id="loadingIA">🤖 IA ANALISANDO...</div>
      <div id="resultado"></div>
    </div>

    <div id="denunciar" class="conteudo-aba">
      <select id="tipoDenuncia"><option value="site">Site Falso</option><option value="pix">Pix Irregular</option></select>
      <input type="text" id="valorDenuncia" placeholder="Cole aqui">
      <button class="btn-principal" onclick="cadastrarDenuncia()">📢 ENVIAR DENÚNCIA</button>
      <div id="resultadoDenuncia"></div>
    </div>
  </div>
</div>

<script>
  // 🔗 LINK DO SEU WORKER (CONFIRA NO CLOUDFLARE)
  const WORKER_URL = 'https://sentinela.barbosaferrera492.workers.dev';[cite: 1]

  function mudarAba(nome) {
    document.querySelectorAll('.conteudo-aba').forEach(el => el.classList.remove('ativa'));
    document.querySelectorAll('.aba').forEach(el => el.classList.remove('ativa'));
    document.getElementById(nome).classList.add('ativa');
    document.getElementById('aba-' + nome).classList.add('ativa');
  }

  async function verificarComIA() {
    const entrada = document.getElementById('entradaUsuario').value.trim();[cite: 1]
    const resultado = document.getElementById('resultado');[cite: 1]
    const loading = document.getElementById('loadingIA');[cite: 1]
    const btn = document.getElementById('btnVerificar');[cite: 1]

    if (!entrada) return;[cite: 1]

    resultado.style.display = 'none';[cite: 1]
    loading.style.display = 'block';[cite: 1]
    btn.disabled = true;[cite: 1]

    try {
      const res = await fetch(WORKER_URL, {[cite: 1]
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ entrada })[cite: 1]
      });

      const dados = await res.json();[cite: 1]
      loading.style.display = 'none';[cite: 1]
      btn.disabled = false;[cite: 1]

      let analise = null;
      try {
        const textoLimpo = dados.resposta.replace(/```json/g, '').replace(/
```/g, '').trim();
        analise = JSON.parse(textoLimpo);
      } catch(e) {
        const match = dados.resposta.match(/\{[\s\S]*\}/);[cite: 1]
        if (match) analise = JSON.parse(match[0]);[cite: 1]
      }

      resultado.style.display = 'block';[cite: 1]
      if (analise && analise.nivel) {
        resultado.className = analise.nivel.toLowerCase();[cite: 1]
        resultado.innerHTML = `<strong>${analise.titulo}</strong><br>${analise.analise}<br><small>💡 ${analise.dica}</small>`;[cite: 1]
      } else {
        resultado.className = 'alerta';[cite: 1]
        resultado.innerHTML = dados.resposta;[cite: 1]
      }
    } catch(err) {
      loading.style.display = 'none';[cite: 1]
      btn.disabled = false;[cite: 1]
      resultado.style.display = 'block';[cite: 1]
      resultado.className = 'perigo';[cite: 1]
      resultado.innerHTML = 'Erro de conexão. Verifique o Worker.';[cite: 1]
    }
  }

  function cadastrarDenuncia() {
    const resDiv = document.getElementById('resultadoDenuncia');[cite: 1]
    resDiv.style.display = 'block';[cite: 1]
    resDiv.className = 'sucesso';[cite: 1]
    resDiv.innerHTML = '✅ Denúncia enviada para análise!';[cite: 1]
  }
</script>
</body>
</html>
