<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sentinela Cidadão - SF</title>
    <style>
        body { font-family: sans-serif; background: #001830; color: white; text-align: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; max-width: 400px; margin: 0 auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; }
        button { background: #FFD700; color: #00264d; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 90%; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .perigo { background: #ff6b6b; color: white; }
        .seguro { background: #2ecc71; color: white; }
        .alerta { background: #f39c12; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛡️ Sentinela Cidadão</h2>
        <p>São Fidélis Protegida</p>
        <br>
        <input type="text" id="entradaUsuario" placeholder="Site ou Chave Pix">
        <button id="btnVerificar" onclick="verificarComIA()">🔍 VERIFICAR AGORA</button>
        <div id="resultado"></div>
    </div>

    <script>
        // 🚨 CONFIRA SE ESTE LINK É O SEU MESMO!
        const WORKER_URL = 'https://sentinela.barbosaferrera492.workers.dev';[cite: 1]

        async function verificarComIA() {
            const entrada = document.getElementById('entradaUsuario').value.trim();[cite: 1]
            const resultado = document.getElementById('resultado');[cite: 1]
            const btn = document.getElementById('btnVerificar');[cite: 1]

            if (!entrada) {
                alert("Digite algo primeiro!");
                return;
            }

            btn.innerText = "⌛ ANALISANDO...";
            btn.disabled = true;
            resultado.style.display = 'none';

            try {
                const response = await fetch(WORKER_URL, {[cite: 1]
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entrada: entrada })[cite: 1]
                });

                const dados = await response.json();[cite: 1]
                
                // O Jaime (IA) responde dentro de dados.resposta
                let analise = { nivel: 'ALERTA', titulo: 'Aviso', analise: dados.resposta };
                
                try {
                    // Tenta limpar se a IA mandou JSON
                    const textoLimpo = dados.resposta.replace(/```json/g, '').replace(/
```/g, '').trim();
                    analise = JSON.parse(textoLimpo);[cite: 1]
                } catch(e) { 
                    // Se não for JSON, usa o texto puro[cite: 1]
                }

                resultado.style.display = 'block';
                resultado.className = analise.nivel ? analise.nivel.toLowerCase() : 'alerta';[cite: 1]
                resultado.innerHTML = `<strong>${analise.titulo || 'Análise'}</strong><br>${analise.analise || dados.resposta}`;[cite: 1]

            } catch (err) {
                resultado.style.display = 'block';
                resultado.className = 'perigo';
                resultado.innerHTML = "❌ Erro ao conectar com o servidor.";
            } finally {
                btn.innerText = "🔍 VERIFICAR AGORA";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
